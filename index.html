<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CUSTOMIZE: Browser tab title -->
    <title>Will You Be My Valentine? 💝</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Floating Background Elements -->
    <div class="floating-elements" aria-hidden="true">
      <!-- Hearts and bears will be added here by JavaScript -->
    </div>

    <!-- Main Content Container -->
    <main class="container">
      <h1 id="valentineTitle"></h1>

      <!-- Music Player -->
      <div id="musicControls" class="music-controls">
        <button
          id="musicToggle"
          class="music-btn"
          aria-label="Toggle Background Music"
        >
          🎵 Play Music
        </button>
        <audio id="bgMusic" loop>
          <source id="musicSource" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>

      <!-- First Question -->
      <section class="question-section" id="question1">
        <h2 id="question1Text"></h2>
        <div class="button-group">
          <button
            class="cute-btn"
            onclick="moveButton(this)"
            id="yesBtn1"
          ></button>
          <button
            class="cute-btn"
            onclick="moveButton(this)"
            id="noBtn1"
          ></button>
        </div>
        <!-- CUSTOMIZE: Secret answer text -->
        <div class="secret-answer">
          <button
            class="cute-btn special"
            onclick="showNextQuestion(2)"
            id="secretAnswerBtn"
          ></button>
        </div>
      </section>

      <!-- Second Question (Love Meter) -->
      <section class="question-section hidden" id="question2">
        <h2 id="question2Text"></h2>
        <!-- Love meter settings: min="0" max="10000" -->
        <div class="love-meter">
          <label for="loveMeter" class="sr-only">Love Meter</label>
          <input
            type="range"
            min="0"
            max="10000"
            value="100"
            class="slider"
            id="loveMeter"
          />
          <p>
            <span class="love-value-container"
              ><span id="startText"></span> (<span id="loveValue">100</span
              >%)</span
            >
            <span id="extraLove" class="hidden"></span>
          </p>
        </div>
        <button
          class="cute-btn"
          onclick="showNextQuestion(3)"
          id="nextBtn"
        ></button>
      </section>

      <!-- Final Question -->
      <section class="question-section hidden" id="question3">
        <h2 id="question3Text"></h2>
        <div class="button-group">
          <button
            class="cute-btn final-yes"
            onclick="celebrate()"
            id="yesBtn3"
          ></button>
          <button
            class="cute-btn"
            onclick="moveButton(this)"
            id="noBtn3"
          ></button>
        </div>
      </section>

      <!-- CUSTOMIZE: Celebration message -->
      <section class="celebration hidden" id="celebration">
        <h2 id="celebrationTitle"></h2>
        <p class="celebration-text" id="celebrationMessage"></p>
        <p class="celebration-text" id="celebrationEmojis"></p>
        
        <!-- Lightweight Book Gallery -->
        <div class="player-container">
          <div class="player-stage">
            <div class="book" id="book">
              <div class="book-inner">
                <div class="page left" id="page-left"></div>
                <div class="page right" id="page-right"></div>

                <!-- flipper overlays the right page and animates a turn -->
                <div class="flipper" id="flipper" aria-hidden="true">
                  <div class="flip-face front" id="flip-front"></div>
                  <div class="flip-face back" id="flip-back"></div>
                </div>
              </div>
            </div>
            <!-- Overlay nav buttons on book (left/right) -->
            <button id="book-prev-overlay" class="nav-btn prev-btn overlay-btn" aria-label="Previous page">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 18L9 12L15 6" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="book-next-overlay" class="nav-btn next-btn overlay-btn" aria-label="Next page">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18L15 12L9 6" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <nav class="player-controls">
            <div class="book-controls">
              <button id="book-prev" class="nav-btn prev-btn" aria-label="Previous page">◀</button>
              <div class="page-counter">
                <span id="book-current">1</span> / <span id="book-total">1</span>
              </div>
              <button id="book-next" class="nav-btn next-btn" aria-label="Next page">▶</button>
            </div>
          </nav>
        </div>
      </section>

      <!-- Share Button -->
      <div class="share-container">
        <button
          id="shareBtn"
          class="share-btn"
          aria-label="Copy shareable link"
        >
          🔗 Share This Page
        </button>
      </div>
    </main>

  <!-- Scripts -->
    <script src="config.js"></script>
    <script src="config-system.js"></script>
    <script src="state.js"></script>
    <script src="theme.js"></script>
    <script src="script.js"></script>
  </body>
</html>
